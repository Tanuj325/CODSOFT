services:
  - type: web
    name: pdf-page-mixer-backend
    runtime: java
    plan: free
    rootDir: backend
    buildCommand: ./mvnw -DskipTests package || mvn -DskipTests package
    startCommand: java -jar target/*.jar
    envVars:
      - key: JAVA_VERSION
        value: 17
      - key: app.frontend-origin
        sync: false
